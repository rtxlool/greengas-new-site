<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GreenGas Hemp â€” Not Your Father's Hemp.</title>
<meta name="description" content="Small-batch hemp grown, cured, and lab-tested in Virginia. Reserve flower, hash rosin, vape carts. COA on every product. Not your father's hemp." />
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:   #F2EDDD;   /* warm cream - main bg */
    --paper-2: #E6DFC6;   /* deeper cream */
    --ink:     #0D0F0B;   /* near-black, slightly warm */
    --ink-2:   #1A1D16;
    --olive:   #4A6825;
    --olive-d: #2D4316;
    --olive-l: #6B8C3A;
    --gold:    #C19D57;
    --gold-d:  #9C7C3F;
    --rust:    #A24A22;
    --bone:    #E8E2CC;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    /* subtle paper grain */
    background-image:
      radial-gradient(at 12% 18%, rgba(74,104,37,0.06) 0, transparent 50%),
      radial-gradient(at 85% 75%, rgba(193,157,87,0.05) 0, transparent 50%);
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; }

  /* TYPE */
  .anton { font-family: 'Anton', 'Archivo Black', system-ui, sans-serif; font-weight: 400; letter-spacing: -0.005em; line-height: 0.88; text-transform: uppercase; }
  .display { font-family: 'Archivo', system-ui, sans-serif; font-weight: 900; letter-spacing: -0.025em; line-height: 0.95; }
  .script { font-family: 'Caveat', cursive; font-weight: 700; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
  .tabular { font-variant-numeric: tabular-nums; }
  .kicker {
    font-family: 'Archivo', sans-serif;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 700;
    color: var(--olive);
  }
  .container { max-width: 1320px; margin: 0 auto; padding: 0 24px; }
  @media (min-width: 768px){ .container { padding: 0 56px; } }

  /* PROMO STRIP */
  .promo {
    background: var(--ink); color: var(--paper);
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600;
    overflow: hidden;
  }
  .promo-track {
    display: flex; gap: 48px; padding: 11px 0; white-space: nowrap;
    animation: marquee 42s linear infinite;
  }
  .promo-track span { display: inline-flex; align-items: center; gap: 14px; }
  .promo-track .star { color: var(--gold); }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* HEADER */
  header.main {
    position: sticky; top: 0; z-index: 40;
    background: rgba(13,15,11, 0.97);
    color: var(--paper);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  header.main .row {
    height: 78px; display:flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 14px;
    font-family: 'Anton', sans-serif; font-size: 26px; letter-spacing: 0.01em;
    text-transform: uppercase; color: var(--paper);
  }
  .logo .dot { color: var(--gold); }
  .logo .tag {
    display: none;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 16px;
    color: var(--gold); transform: rotate(-3deg); letter-spacing: 0;
    text-transform: none; margin-left: 4px;
  }
  @media (min-width: 900px){ .logo .tag { display: inline; } }
  .logo-img { height: 48px; width: auto; display: block; }
  .logo-img.header { height: 44px; border-radius: 2px; }
  .logo-img.crest { height: 96px; margin: 0 auto 20px; }
  .logo-img.footer { height: 60px; border-radius: 2px; }
  .logo-stamp {
    position: absolute; z-index: 3;
    background: var(--paper);
    padding: 8px 12px;
    border: 1px solid rgba(13,15,11,0.08);
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
    transform: rotate(-6deg);
  }
  .logo-stamp img { height: 44px; width: auto; display: block; }
  nav.primary { display:none; gap: 32px; }
  @media (min-width: 900px){ nav.primary { display: flex; } }
  nav.primary a {
    font-family: 'Archivo', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--paper);
    padding: 4px 0; position: relative;
  }
  nav.primary a::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left;
    transition: transform 240ms ease;
  }
  nav.primary a:hover::after, nav.primary a.active::after { transform: scaleX(1); }
  .icons { display:flex; align-items: center; gap: 8px; }
  .icons button, .icons a {
    background: transparent; border: 0; color: var(--paper);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 4px;
    font-family: 'Archivo', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .icons a:hover, .icons button:hover { background: rgba(255,255,255,0.06); }
  .cart-btn { border: 1px solid rgba(255,255,255,0.16) !important; }
  .cart-count {
    background: var(--gold); color: var(--ink);
    padding: 1px 7px; border-radius: 2px; font-size: 11px; font-weight: 800;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 26px;
    font-family: 'Archivo', sans-serif; font-size: 13px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    border: 1px solid transparent; border-radius: 2px;
    transition: background 180ms ease, color 180ms ease;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--olive); }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-gold:hover { background: var(--ink); color: var(--gold); }
  .btn-outline-light { background: transparent; color: var(--paper); border-color: var(--paper); }
  .btn-outline-light:hover { background: var(--paper); color: var(--ink); }
  .btn-outline-dark { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-outline-dark:hover { background: var(--ink); color: var(--paper); }

  /* HERO */
  section.hero {
    background: var(--ink); color: var(--paper);
    position: relative; overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .hero-inner {
    position: relative;
    display: grid; grid-template-columns: 1fr; gap: 40px;
    padding: 60px 0 80px;
    align-items: center;
  }
  @media (min-width: 1000px){
    .hero-inner { grid-template-columns: 1.2fr 1fr; gap: 56px; padding: 72px 0 100px; }
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    border: 1px solid rgba(255,255,255,0.16);
    padding: 8px 16px; border-radius: 2px;
    margin-bottom: 32px;
  }
  .hero-eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 0 4px rgba(193,157,87,0.18); }
  .hero-eyebrow .text { font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--paper); }
  .hero-eyebrow .est { color: var(--gold); }

  .slogan {
    font-size: clamp(58px, 11vw, 168px);
    margin: 0;
    color: var(--paper);
  }
  .slogan .a { display: block; }
  .slogan .b { display: block; color: var(--olive-l); }
  .slogan .c { display: block; }
  .slogan .stroke {
    -webkit-text-stroke: 2px var(--paper);
    color: transparent;
  }
  .slogan .underline {
    position: relative; display: inline-block;
  }
  .slogan .underline::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 6px;
    height: 6px; background: var(--gold); transform: skewX(-12deg);
    z-index: -1;
  }

  .hero-sub {
    margin-top: 32px; max-width: 520px;
    font-size: 17px; line-height: 1.6; color: rgba(242,237,221,0.78);
  }
  .hero-ctas { display:flex; flex-wrap: wrap; gap: 12px; margin-top: 36px; }
  .hero-stats {
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-top: 48px; padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .hero-stats .stat .n {
    font-family: 'Anton', sans-serif; font-size: 36px; line-height: 1; color: var(--gold);
    margin-bottom: 6px;
  }
  .hero-stats .stat .l {
    font-family: 'Archivo', sans-serif; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(242,237,221,0.6); font-weight: 600;
  }

  /* HERO PHOTO */
  .hero-photo {
    position: relative;
    aspect-ratio: 4/5;
    background: var(--ink-2);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .hero-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.95; }
  .hero-photo::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(13,15,11,0.85) 100%);
    z-index: 1;
  }
  .hero-photo .stamp {
    position: absolute; top: 20px; right: 20px; z-index: 2;
    width: 110px; height: 110px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: var(--gold);
    font-family: 'Anton', sans-serif; line-height: 1;
    transform: rotate(-8deg);
    background: rgba(13,15,11,0.7); backdrop-filter: blur(6px);
  }
  .hero-photo .stamp .s1 { font-size: 11px; letter-spacing: 0.2em; }
  .hero-photo .stamp .s2 { font-size: 32px; margin: 6px 0; letter-spacing: 0.04em; }
  .hero-photo .stamp .s3 { font-size: 10px; letter-spacing: 0.18em; }
  .hero-photo .caption {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 2;
    color: var(--paper);
  }
  .hero-photo .caption .name { font-family: 'Anton', sans-serif; font-size: 32px; letter-spacing: 0.02em; }
  .hero-photo .caption .meta {
    display: flex; align-items: center; gap: 12px; margin-top: 6px;
    font-family: 'Archivo', sans-serif; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(242,237,221,0.75);
  }
  .hero-photo .caption .meta .price { color: var(--gold); font-weight: 800; }

  /* BIG TAGLINE BANNER */
  .banner {
    background: var(--gold); color: var(--ink);
    overflow: hidden;
    border-top: 1px solid rgba(0,0,0,0.06);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .banner-track {
    display: flex; gap: 0; padding: 18px 0; white-space: nowrap;
    font-family: 'Anton', sans-serif; font-size: clamp(38px, 6vw, 72px);
    text-transform: uppercase; letter-spacing: 0.01em;
    animation: marquee 32s linear infinite;
  }
  .banner-track span { display: inline-flex; align-items: center; padding: 0 32px; }
  .banner-track .dot {
    width: 14px; height: 14px; border-radius: 50%; background: var(--ink);
    margin: 0 32px; flex-shrink: 0; align-self: center;
  }

  /* INTRO / FOUNDER NOTE */
  section.intro { padding: 100px 0 60px; }
  .intro-grid { display: grid; grid-template-columns: 1fr; gap: 48px; align-items: start; }
  @media (min-width: 900px){ .intro-grid { grid-template-columns: 0.9fr 1.1fr; gap: 80px; } }
  .intro-head h2 {
    font-size: clamp(40px, 5.5vw, 76px); margin: 16px 0 0; color: var(--ink);
  }
  .intro-body p {
    font-size: 17px; line-height: 1.65; color: rgba(13,15,11,0.72);
    margin: 0 0 20px;
  }
  .signature {
    display: flex; align-items: center; gap: 20px; margin-top: 36px;
    padding-top: 24px; border-top: 1px solid rgba(13,15,11,0.12);
  }
  .signature .sig {
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 38px;
    color: var(--olive); transform: rotate(-2deg) translateY(-2px);
  }
  .signature .who {
    font-family: 'Archivo', sans-serif; font-size: 12px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(13,15,11,0.55); font-weight: 700;
  }
  .signature .who strong { display:block; color: var(--ink); font-weight: 800; letter-spacing: 0.04em; }

  /* PROCESS */
  section.process { padding: 80px 0 120px; }
  .process-grid { display: grid; grid-template-columns: 1fr; gap: 0; border: 1px solid rgba(13,15,11,0.12); }
  @media (min-width: 768px){ .process-grid { grid-template-columns: repeat(3, 1fr); } }
  .step {
    padding: 44px 36px;
    border-bottom: 1px solid rgba(13,15,11,0.12);
    background: var(--paper);
    position: relative;
    transition: background 200ms ease;
  }
  .step:hover { background: var(--paper-2); }
  @media (min-width: 768px){
    .step { border-right: 1px solid rgba(13,15,11,0.12); border-bottom: 0; }
    .step:last-child { border-right: 0; }
  }
  .step .num {
    font-family: 'Anton', sans-serif; font-size: 72px; color: var(--olive);
    line-height: 0.9; margin-bottom: 24px;
    -webkit-text-stroke: 0;
  }
  .step h3 { font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 0.01em; margin: 0 0 14px; text-transform: uppercase; }
  .step p { font-size: 15px; line-height: 1.65; color: rgba(13,15,11,0.65); margin: 0; }

  /* DROPS */
  section.drops { padding: 100px 0; background: var(--ink); color: var(--paper); position: relative; }
  .drops-head { display:flex; flex-wrap: wrap; justify-content: space-between; align-items: end; gap: 24px; margin-bottom: 56px; }
  .drops-head .kicker { color: var(--gold); }
  .drops-head h2 { font-size: clamp(44px, 5.5vw, 72px); margin: 14px 0 0; color: var(--paper); }
  .drops-head .link {
    font-family: 'Archivo', sans-serif; font-size: 12px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold);
    border-bottom: 1.5px solid var(--gold); padding-bottom: 4px;
  }
  .drops-head .link:hover { color: var(--paper); border-color: var(--paper); }

  .drops-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
  @media (min-width:768px){ .drops-grid { grid-template-columns: repeat(4,1fr); gap: 20px; } }
  .pcard {
    background: var(--ink-2);
    display: block; position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    transition: border-color 200ms ease;
  }
  .pcard:hover { border-color: var(--gold); }
  .pcard .ph { aspect-ratio: 1; overflow: hidden; background: #000; position: relative; }
  .pcard .ph img { width: 100%; height: 100%; object-fit: cover; transition: transform 800ms ease; }
  .pcard:hover .ph img { transform: scale(1.06); }
  .pcard .stock {
    position: absolute; top: 12px; left: 12px;
    background: var(--gold); color: var(--ink);
    padding: 5px 10px;
    font-family: 'Archivo', sans-serif; font-size: 10px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .pcard .body { padding: 22px 22px 24px; }
  .pcard .cat { font-family: 'Archivo', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); }
  .pcard h4 { font-family: 'Anton', sans-serif; font-size: 26px; letter-spacing: 0.01em; text-transform: uppercase; margin: 12px 0 6px; }
  .pcard .strain { font-size: 12px; color: rgba(242,237,221,0.55); margin: 0 0 22px; letter-spacing: 0.04em; }
  .pcard .foot { display:flex; align-items: center; justify-content: space-between; }
  .pcard .price { font-family: 'Anton', sans-serif; font-size: 26px; color: var(--gold); letter-spacing: 0.02em; }
  .pcard .add {
    font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.18); color: var(--paper);
    transition: background 180ms ease, color 180ms ease;
  }
  .pcard:hover .add { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  /* CATEGORIES */
  section.categories { padding: 120px 0; }
  .cat-head { display:flex; flex-wrap: wrap; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 56px; }
  .cat-head h2 { font-size: clamp(44px, 5.5vw, 80px); margin: 14px 0 0; }
  .cat-grid { display:grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 768px){ .cat-grid { grid-template-columns: 1.4fr 1fr 1fr; gap: 20px; } }
  .cat-card { position: relative; aspect-ratio: 4/5; overflow: hidden; color: var(--paper); border: 1px solid rgba(13,15,11,0.08); }
  @media (min-width: 768px){ .cat-card:first-child { aspect-ratio: auto; grid-row: span 2; } }
  .cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 1100ms ease; }
  .cat-card:hover img { transform: scale(1.05); }
  .cat-card .veil { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,15,11,0.9) 5%, rgba(13,15,11,0.2) 55%, transparent 100%); }
  .cat-card .info { position: absolute; left: 28px; right: 28px; bottom: 28px; z-index: 2; }
  .cat-card .info .kicker { color: var(--gold); margin-bottom: 8px; }
  .cat-card .info h3 { font-family: 'Anton', sans-serif; font-size: clamp(36px, 4vw, 56px); margin: 0; letter-spacing: 0.01em; text-transform: uppercase; }
  .cat-card .info p { margin: 8px 0 0; opacity: 0.72; font-size: 14px; }
  .cat-card .corner {
    position: absolute; top: 20px; right: 20px; z-index: 2;
    font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--paper);
    background: rgba(13,15,11,0.5); backdrop-filter: blur(6px);
    padding: 8px 12px;
  }

  /* QUOTE */
  section.quote {
    padding: 140px 0; background: var(--olive); color: var(--paper);
    position: relative; overflow: hidden; text-align: center;
  }
  .quote::before {
    content: '"'; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    font-family: 'Anton', sans-serif; font-size: 360px; line-height: 1;
    color: rgba(242,237,221,0.06); pointer-events: none;
  }
  .quote-inner { max-width: 900px; margin: 0 auto; position: relative; }
  .quote-inner blockquote {
    font-family: 'Anton', sans-serif; font-size: clamp(32px, 4.5vw, 56px);
    line-height: 1.1; letter-spacing: 0.005em; margin: 0; text-transform: uppercase;
  }
  .quote-inner blockquote .high { color: var(--gold); }
  .quote-inner cite { display: block; margin-top: 36px; font-style: normal; font-family: 'Archivo', sans-serif; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(242,237,221,0.7); font-weight: 700; }

  /* EMAIL / GAS FAM */
  section.gasfam {
    padding: 120px 0; background: var(--paper-2);
    border-top: 1px solid rgba(13,15,11,0.08);
    position: relative;
  }
  .gasfam-inner { max-width: 760px; margin: 0 auto; text-align: center; }
  .gasfam .script-tag { font-family: 'Caveat', cursive; font-weight: 700; font-size: 32px; color: var(--olive); transform: rotate(-2deg); display: inline-block; margin-bottom: -6px; }
  .gasfam h2 { font-size: clamp(44px, 6vw, 88px); margin: 8px 0 16px; color: var(--ink); }
  .gasfam p { font-size: 16px; color: rgba(13,15,11,0.65); max-width: 480px; margin: 0 auto 36px; line-height: 1.6; }
  .gasfam-form { display:flex; gap: 10px; max-width: 480px; margin: 0 auto; flex-wrap: wrap; }
  .gasfam-form input {
    flex: 1; min-width: 220px;
    padding: 16px 22px;
    background: var(--paper); border: 1px solid var(--ink);
    font-family: inherit; font-size: 15px; color: var(--ink);
    border-radius: 2px;
  }
  .gasfam-form input:focus { outline: 2px solid var(--gold); outline-offset: -1px; }
  .gasfam .perks {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 24px;
    margin-top: 36px; font-family: 'Archivo', sans-serif; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; color: var(--olive);
  }
  .gasfam .perks span::before { content: 'âœ“'; margin-right: 8px; color: var(--gold); }

  /* FOOTER */
  footer.site { background: var(--ink); color: var(--paper); padding: 90px 0 28px; position: relative; }
  .foot-mega {
    font-family: 'Anton', sans-serif; text-transform: uppercase;
    font-size: clamp(72px, 14vw, 220px); line-height: 0.85; letter-spacing: -0.01em;
    color: var(--paper); margin: 0 0 60px;
    border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 40px;
  }
  .foot-mega .gold { color: var(--gold); }
  .foot-grid { display:grid; grid-template-columns: 1fr; gap: 40px; }
  @media (min-width:768px){ .foot-grid { grid-template-columns: 2fr 1fr 1fr 1fr; } }

  function injectLogos() {
    document.querySelectorAll('.logo-img, .logo-stamp img').forEach(img => { img.src = LOGO_DATA_URL; });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectLogos);
  } else {
    injectLogos();
  }

  function confirmAge() {
    localStorage.setItem('gg_age_ok', '1');
    document.getElementById('ageGate').style.display = 'none';
    document.body.style.overflow = '';
  }
  // Scroll reveals
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
